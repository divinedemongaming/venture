<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VENTURE — Sign Up</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }
    .logo {
      font-size: 48px;
      text-align: center;
      margin-bottom: 20px;
    }
    h1 {
      color: #fff;
      font-size: 28px;
      margin-bottom: 8px;
      text-align: center;
      font-weight: 800;
    }
    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      text-align: center;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    input:focus, select:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 165, 0, 0.5);
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    .password-hint {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      margin-top: 4px;
    }
    .button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ffa500 0%, #ff8c00 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }
    .button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(255, 165, 0, 0.3);
    }
    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      color: #f87171;
      font-size: 13px;
      margin-top: 8px;
      padding: 10px;
      background: rgba(248, 113, 113, 0.1);
      border-radius: 6px;
      display: none;
    }
    .success {
      color: #4ade80;
      font-size: 13px;
      margin-top: 8px;
      padding: 10px;
      background: rgba(74, 222, 128, 0.1);
      border-radius: 6px;
      display: none;
    }
    .login-link {
      text-align: center;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
    }
    .login-link a {
      color: #ffa500;
      text-decoration: none;
      font-weight: 600;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎮</div>
    <h1>VENTURE</h1>
    <p class="subtitle">Create your account to get started</p>

    <form id="signupForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="username" required>
        <div class="password-hint">3-30 characters, letters/numbers/underscore only</div>
      </div>

      <div class="form-group">
        <label for="displayName">Display Name</label>
        <input type="text" id="displayName" name="displayName" placeholder="Your name" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
        <div class="password-hint">8+ chars: uppercase, lowercase, number, special character (@$!%*?&_#)</div>
      </div>

      <div class="form-group">
        <label for="accountType">I am a</label>
        <select id="accountType" name="accountType">
          <option value="false">Parent / Guardian</option>
          <option value="true">Content Creator</option>
        </select>
      </div>

      <button type="submit" class="button">Create Account</button>

      <div id="error" class="error"></div>
      <div id="success" class="success"></div>
    </form>

    <div class="login-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>

    <div class="footer">
      © 2024 DivineDemonGaming Inc. All Rights Reserved.
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim().toLowerCase();
      const displayName = document.getElementById('displayName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const isCreator = document.getElementById('accountType').value === 'true';

      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');
      const btn = e.target.querySelector('button');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      // Client-side validation
      if (username.length < 3 || username.length > 30) {
        errorEl.textContent = 'Username must be 3-30 characters';
        errorEl.style.display = 'block';
        return;
      }

      if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        errorEl.textContent = 'Username can only contain letters, numbers, and underscores';
        errorEl.style.display = 'block';
        return;
      }

      if (password.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters';
        errorEl.style.display = 'block';
        return;
      }

      if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&_#])/.test(password)) {
        errorEl.textContent = 'Password must include uppercase, lowercase, number, and special character';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch(`${API_BASE}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username,
            displayName,
            email,
            password,
            isCreator
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || data.errors?.[0]?.msg || 'Signup failed');
        }

        successEl.textContent = '✓ Account created! Redirecting...';
        successEl.style.display = 'block';

        setTimeout(() => {
          window.location.href = '/login';
        }, 1500);

      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
