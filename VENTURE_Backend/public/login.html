<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VENTURE — Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }
    .logo {
      font-size: 48px;
      text-align: center;
      margin-bottom: 20px;
    }
    h1 {
      color: #fff;
      font-size: 28px;
      margin-bottom: 8px;
      text-align: center;
      font-weight: 800;
    }
    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      text-align: center;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    input:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 165, 0, 0.5);
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    .button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ffa500 0%, #ff8c00 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }
    .button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(255, 165, 0, 0.3);
    }
    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      color: #f87171;
      font-size: 13px;
      margin-top: 8px;
      padding: 10px;
      background: rgba(248, 113, 113, 0.1);
      border-radius: 6px;
      display: none;
    }
    .success {
      color: #4ade80;
      font-size: 13px;
      margin-top: 8px;
      padding: 10px;
      background: rgba(74, 222, 128, 0.1);
      border-radius: 6px;
      display: none;
    }
    .signup-link {
      text-align: center;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
    }
    .signup-link a {
      color: #ffa500;
      text-decoration: none;
      font-weight: 600;
    }
    .signup-link a:hover {
      text-decoration: underline;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎮</div>
    <h1>VENTURE</h1>
    <p class="subtitle">Sign in to your account</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email or Username</label>
        <input type="text" id="email" name="identifier" placeholder="your@email.com" required autofocus>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="button">Sign In</button>

      <div id="error" class="error"></div>
      <div id="success" class="success"></div>
    </form>

    <div class="signup-link">
      New to VENTURE? <a href="/signup">Create an account</a>
    </div>

    <div class="footer">
      © 2024 DivineDemonGaming Inc. All Rights Reserved.
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const identifier = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');
      const btn = e.target.querySelector('button');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Login failed');
        }

        // Store tokens if provided
        if (data.accessToken) {
          localStorage.setItem('accessToken', data.accessToken);
          localStorage.setItem('refreshToken', data.refreshToken || '');
        }

        successEl.textContent = '✓ Signed in! Redirecting...';
        successEl.style.display = 'block';

        // Redirect to dashboard or home
        setTimeout(() => {
          window.location.href = '/dashboard' || '/home';
        }, 1000);

      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
